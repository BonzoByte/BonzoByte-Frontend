<!doctype html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <script>
        (function () {
            try {
                // Capture email verification tokens before Angular boots.
                var m = /[?&]token=([^&]+)/.exec(window.location.search);
                if (m && m[1]) {
                    sessionStorage.setItem('verifyToken', decodeURIComponent(m[1]));
                }
            } catch (e) {
                console.warn('[verify preboot] failed to capture token', e);
            }
        })();
    </script>

    <script>
        (function () {
            try {
                var path = window.location.pathname.replace(/\/+$/, '');
                if (path !== '/oauth-success') return;

                var hash = (window.location.hash || '').replace(/^#/, '');
                if (!hash) return;

                var token = new URLSearchParams(hash).get('token');
                if (!token) return;

                // Hand the token to Angular and remove it before analytics scripts load.
                sessionStorage.setItem('BB_oauth_token', token);
                history.replaceState(null, document.title, window.location.pathname + window.location.search);
            } catch (_) { }
        })();
    </script>

    <meta charset="utf-8">
    <title>BonzoByte | Full-Stack Tennis Analytics Platform</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta
        name="description"
        content="BonzoByte is a full-stack tennis analytics platform showcasing ASP.NET Core, Angular, SQL Server, Brotli archive delivery, granular TrueSkill modeling, neural-network probabilities, and research-driven model insights." />
