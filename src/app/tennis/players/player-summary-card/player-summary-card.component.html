<div class="bb-player-single">
    <div class="bb-player-head">
        <span class="bb-flag-wrap" *ngIf="flagIso2OrEmpty(countryIso2) as iso" [title]="countryFull || 'World'">
            <span class="fi fi-{{ iso }} bb-flag-sm"></span>
        </span>

        <div class="bb-player-name">
            <span class="bb-dot bb-dot-red bb-dot-inline" aria-hidden="true"></span>
            {{ playerName }}
            <span *ngIf="countryIso3">({{ countryIso3 }})</span>
        </div>
    </div>

    <div class="bb-player-body bb-player-body--single">
        <div class="bb-avatar">
            <img [src]="avatarUrl" (error)="onAvatarError($event)" alt="Player avatar" loading="lazy" />
        </div>

        <div class="bb-kv">
            <div class="bb-kv-row" *ngIf="bornText">
                <div class="bb-k">Born</div>
                <div class="bb-v">{{ bornText }}</div>
            </div>

            <div class="bb-kv-row" *ngIf="countryFull">
                <div class="bb-k">Country</div>
                <div class="bb-v">{{ countryFull }}</div>
            </div>

            <div class="bb-kv-row" *ngIf="continentName">
                <div class="bb-k">Continent</div>
                <div class="bb-v">{{ continentName }}</div>
            </div>

            <div class="bb-kv-row" *ngIf="heightText">
                <div class="bb-k">Height</div>
                <div class="bb-v">{{ heightText }}</div>
            </div>

            <div class="bb-kv-row" *ngIf="weightText">
                <div class="bb-k">Weight</div>
                <div class="bb-v">{{ weightText }}</div>
            </div>

            <div class="bb-kv-row" *ngIf="playsText">
                <div class="bb-k">Plays</div>
                <div class="bb-v">{{ playsText }}</div>
            </div>

            <div class="bb-kv-row" *ngIf="turnedProText">
                <div class="bb-k">Turned Pro</div>
                <div class="bb-v">{{ turnedProText }}</div>
            </div>
        </div>
    </div>
</div>
