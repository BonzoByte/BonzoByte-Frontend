<nav id="main-header" class="custom-header app-header">
    <div>
        <div class="navbar-nav">
            <a routerLink="/matches" class="logreg">Matches</a>
            <a routerLink="/players" class="logreg">Players</a>
            <a routerLink="/tournaments" class="logreg">Tournaments</a>
            <span class="nav-separator" aria-hidden="true"></span>
            <a routerLink="/analytics" class="logreg">Analytics</a>
            <a routerLink="/model-insights" class="logreg">Model Insights</a>
            <span class="nav-separator" aria-hidden="true"></span>
            <a routerLink="/simulation" class="logreg">Simulation</a>
        </div>

        <div class="brand-title">
            <a routerLink="/" class="main-title brand-link" aria-label="Go to BonzoByte home">
                BonzoByte
            </a>
        </div>

        <div class="navbar-nav">
            <a class="logreg" (click)="openBillingModal()">Pricing</a>
            <span class="nav-separator" aria-hidden="true"></span>

            <ng-container *ngIf="!isLoggedIn; else loggedIn">
                <a class="logreg" (click)="openLoginModal()">{{ 'login' | translate }}</a>
                <a class="logreg" (click)="openRegisterModal()">{{ 'register' | translate }}</a>
            </ng-container>

            <ng-template #loggedIn>
                <div class="user-block">
                    <img
                        class="user-avatar"
                        [src]="user?.avatarUrl || 'assets/images/defaultUser.png'"
                        alt="Avatar"
                        (click)="openUserModal()" />
            
                    <div class="user-meta" (click)="openUserModal()">
                        <div class="user-name">
                            {{ userDisplayName || 'User' }}
                        </div>
            
                        <div class="user-tier">
                            <span>VIP User</span>
                            <span class="user-tier-icon" aria-hidden="true">🏅</span>
                        </div>
                    </div>
            
                    <span class="nav-separator" aria-hidden="true"></span>
            
                    <a class="logreg" (click)="logout()">{{ 'logout' | translate }}</a>
                </div>
            </ng-template>
        </div>
    </div>
</nav>

<app-register *ngIf="showRegisterModal" (closed)="closeRegisterModal()"></app-register>
<app-login *ngIf="showLoginModal" (closed)="closeLoginModal()"></app-login>
<app-billing-modal *ngIf="showBillingModal" (closed)="closeBillingModal()"></app-billing-modal>
