<app-bb-modal-shell title="Register" (closed)="close()">
    <form [formGroup]="registerForm" (ngSubmit)="submit()">
        <div class="bb-alert bb-alert--error" *ngIf="errorMessage" role="alert">
            {{ errorMessage }}
        </div>

        <div class="bb-alert bb-alert--success" *ngIf="successMessage" role="status">
            {{ successMessage }}
        </div>

        <div class="form-row">
            <label for="email">Email</label>
            <input
                id="email"
                type="email"
                formControlName="email"
                placeholder="Email"
                [class.invalid]="email?.invalid && (email?.touched || submitting)" />
            <p class="error" *ngIf="email?.hasError('required') && (email?.touched || submitting)">
                Obavezno
            </p>
            <p class="error" *ngIf="email?.hasError('email') && (email?.touched || submitting)">
                Neispravan email
            </p>
        </div>

        <div class="form-row">
            <label for="nickname">Nickname (optional)</label>
            <input
                id="nickname"
                type="text"
                formControlName="nickname"
                placeholder="Nickname"
                [class.invalid]="nickname?.invalid && (nickname?.touched || submitting)" />
            <p class="error" *ngIf="nickname?.invalid && (nickname?.touched || submitting)">
                Nickname mora imati 3–30 znakova
            </p>
        </div>

        <div class="form-row">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input
                    id="password"
                    class="password-input"
                    [type]="showPassword ? 'text' : 'password'"
                    formControlName="password"
                    placeholder="Password"
                    [class.invalid]="password?.invalid && (password?.touched || submitting)" />
                <button
                    type="button"
                    class="toggle-password"
                    appAccessibleClick
                    (accessibleClick)="togglePasswordVisibility()"
                    aria-label="Toggle password visibility">
                    <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                </button>
            </div>
            <p class="error" *ngIf="password?.hasError('required') && (password?.touched || submitting)">
                Obavezno
            </p>
            <p class="error" *ngIf="password?.hasError('minlength') && (password?.touched || submitting)">
                Min 8 znakova
            </p>
        </div>

        <div class="form-row">
            <label for="confirmPassword">Confirm password</label>
            <div class="password-wrapper">
                <input
                    id="confirmPassword"
                    class="password-input"
                    [type]="showConfirmPassword ? 'text' : 'password'"
                    formControlName="confirmPassword"
                    placeholder="Confirm password"
                    [class.invalid]="(confirmPassword?.invalid || registerForm.errors?.['passwordsMismatch']) && (confirmPassword?.touched || submitting)" />
                <button
                    type="button"
                    class="toggle-password"
                    appAccessibleClick
                    (accessibleClick)="toggleConfirmPasswordVisibility()"
                    aria-label="Toggle confirm password visibility">
                    <i class="bi" [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                </button>
            </div>
            <p class="error" *ngIf="confirmPassword?.hasError('required') && (confirmPassword?.touched || submitting)">
                Obavezno
            </p>
            <p class="error" *ngIf="registerForm.errors?.['passwordsMismatch'] && (confirmPassword?.touched || submitting)">
                Lozinke se ne podudaraju
            </p>
        </div>

        <div bbActions class="bb-actions">
            <button type="submit" class="oauth-btn" [disabled]="registerForm.invalid || submitting">
                {{ submitting ? 'Registering…' : 'Register' }}
            </button>
        </div>
    </form>
</app-bb-modal-shell>
